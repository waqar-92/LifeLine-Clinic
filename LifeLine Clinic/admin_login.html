<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LifeLine HMS</title>

    <!-- linking css file -->
    <link rel="stylesheet" href="admin_login.css">
    <link rel="stylesheet" href="./public/admin_login.css">

    <!-- linking js file -->
     <script src="admin_login.js" defer></script>
     <script src="./public/admin_login.js" defer></script>
    
</head>
<body>
 <div class="login-container">
    <div class="info-side" style="background: #2c3e50;">
        <div style="font-size: 60px;">🔐</div>
        <h2>Admin Portal</h2>
        <p>Complete hospital oversight, staff management, and billing control.</p>
    </div>
    <div class="form-side">
        <h2>System Login</h2>
        <form id="adminLoginForm">
            <label>Admin Username</label>
            <input type="text" name="email" id="email" placeholder="admin_main" required>
            <label>Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
            <button type="submit" class="login-btn" id="admin_sub_btn">Login</button>
            <p id="errorMessage"></p>
        </form>
        <div class="footer-links">
            <a href="/loginportals">← Back to Selection</a>
            <a href="/">← Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
