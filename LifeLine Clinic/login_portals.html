<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLine Hospital Management</title>
    <link rel="stylesheet" href="login_portals.css">
    <link rel="stylesheet" href="./public/login_portals.css">
</head>
<body>
    <header>
        <h1>LifeLine Hospital Portal</h1>
        <p>Please select your portal to continue</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="icon">👤</div>
            <h2>Patient</h2>
            <p>Book appointments and view bills.</p>
            <a href="/patientlogin" class="btn">Login</a>
        </div>

        <div class="card">
            <div class="icon">🩺</div>
            <h2>Doctor</h2>
            <p>Manage patients and treatments.</p>
            <a href="/doctorlogin" class="btn">Login</a>
        </div>

        <div class="card">
            <div class="icon">🔐</div>
            <h2>Admin</h2>
            <p>System control and staff records.</p>
            <a href="/adminlogin" class="btn">Login</a>
        </div>
    </div>
</body>
</html>
